<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Suite – AI-Powered GEO Content Intelligence</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#12131a;--card-h:#1a1b25;--bdr:#1e2030;--t1:#fff;--t2:#8892b0;--t3:#5a6380}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;line-height:1.6}
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,15,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);padding:10px 40px;display:flex;align-items:center;justify-content:space-between}
.hdr-brand{display:flex;align-items:center;gap:14px}
.hdr-logo{width:44px;height:44px;border-radius:50%;background:conic-gradient(from 200deg,#ff6b35,#e91e63,#9c27b0,#2196f3,#00bcd4,#4caf50,#ffeb3b,#ff6b35);display:flex;align-items:center;justify-content:center}
.hdr-logo span{font-size:20px;font-weight:900;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.hdr-title{font-size:19px;font-weight:700;background:linear-gradient(135deg,#ff6b35,#e91e63,#2196f3,#00bcd4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-right{display:flex;align-items:center;gap:12px}
.lang-btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;background:rgba(255,255,255,.06);border:1px solid var(--bdr);color:var(--t2);cursor:pointer;transition:all .2s}
.lang-btn:hover{background:rgba(255,255,255,.1);color:var(--t1)}
.nav{display:flex;gap:3px;background:rgba(30,32,48,.8);border-radius:8px;padding:4px;border:1px solid var(--bdr)}
.nav a{padding:7px 13px;border-radius:6px;font-size:12px;font-weight:500;color:var(--t2);text-decoration:none;transition:all .2s;white-space:nowrap}
.nav a:hover{color:var(--t1);background:rgba(255,255,255,.05)}
.nav a.active{background:linear-gradient(135deg,rgba(255,107,53,.2),rgba(233,30,99,.2));color:var(--t1)}
.hero{padding:120px 40px 70px;text-align:center;max-width:900px;margin:0 auto}
.hero h1{font-size:44px;font-weight:800;margin-bottom:14px;line-height:1.2}
.hero .gt{background:linear-gradient(135deg,#ff6b35,#e91e63,#9c27b0,#2196f3,#00bcd4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:17px;color:var(--t2);max-width:650px;margin:0 auto 36px}
.stats{display:flex;justify-content:center;gap:48px;margin-top:36px}
.stat-v{font-size:30px;font-weight:700;background:linear-gradient(135deg,#00bcd4,#2196f3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-l{font-size:12px;color:var(--t3);margin-top:4px}
.sec{padding:80px 40px;max-width:1200px;margin:0 auto;border-top:1px solid var(--bdr);scroll-margin-top:75px}
.sec-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:50px;align-items:start}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500;background:rgba(255,255,255,.05);border:1px solid var(--bdr);color:var(--t3);margin-bottom:14px}
.badge .dot{width:6px;height:6px;border-radius:50%;background:#4caf50}
.sec h2{font-size:34px;font-weight:800;margin-bottom:4px}
.sec .sub{font-size:14px;color:var(--t2);margin-bottom:18px;font-style:italic}
.sec .desc{font-size:14px;color:var(--t2);line-height:1.7;margin-bottom:24px}
.share{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500;color:var(--t2);background:rgba(255,255,255,.04);border:1px solid var(--bdr);cursor:pointer;transition:all .2s}
.share:hover{color:var(--t1);border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.08)}
.caps{margin-top:20px}
.caps h4{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:10px}
.cap{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--t2);margin-bottom:7px}
.cap::before{content:'+';color:#00bcd4;font-weight:700;flex-shrink:0}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.icard{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:22px;transition:all .2s}
.icard:hover{border-color:rgba(255,107,53,.3);background:var(--card-h)}
.icard .iv{font-size:22px;font-weight:700;margin-bottom:4px}
.icard .il{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}
.c-zhiku h2,.c-zhiku .iv{color:#ffa726}
.c-zhizao h2,.c-zhizao .iv{color:#ffcc02}
.c-zhiyou h2,.c-zhiyou .iv{color:#e91e63}
.c-zhibu h2,.c-zhibu .iv{color:#29b6f6}
.c-zhixi h2,.c-zhixi .iv{color:#ab47bc}
.c-s3 h2,.c-s3 .iv{color:#42a5f5}
.c-zhichuan h2,.c-zhichuan .iv{color:#26c6da}
.c-zhishu h2{background:linear-gradient(135deg,#ff6b35,#e91e63,#2196f3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.c-zhishu .iv{background:linear-gradient(135deg,#ff6b35,#e91e63);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
@media(max-width:768px){.sec-grid{grid-template-columns:1fr;gap:28px}.nav{display:none}.hero h1{font-size:30px}.stats{flex-wrap:wrap;gap:20px}.igrid{grid-template-columns:1fr}.hdr{padding:10px 16px}}
</style>
</head>
<body>

<div class="hdr-brand"><div class="hdr-logo"><span>智</span></div><span class="hdr-title">Smart Suite</span></div>
<nav class="nav" id="nav"></nav>
<div class="hdr-right"><button class="lang-btn" id="langBtn">中文</button></div>

<div class="stats" id="heroStats"></div>
</section>
<main id="toolSections"></main>
<footer style="padding:50px 40px;text-align:center;border-top:1px solid var(--bdr);color:var(--t3);font-size:13px">
<p>Smart Suite – AI-Powered GEO Content Intelligence Platform</p>
<p style="margin-top:6px">Built by GEO Team · Phase I · 2025–2026</p>
</footer>

let lang = 'en';
function t(obj){ return typeof obj === 'string' ? obj : obj[lang]; }

function render(){
  // Hero
  document.getElementById('heroTitle').innerHTML = '<span class="gt">Smart Suite</span>';
  document.getElementById('heroDesc').textContent = t(DATA.heroDesc);
  document.getElementById('heroStats').innerHTML = DATA.stats.map(s => 
    `<div><div class="stat-v">${s.v}</div><div class="stat-l">${t(s)}</div></div>`).join('');
  // Nav
  const navLabels = {
    en: {zhiku:"Prompt Intelligencer",zhizao:"Content Creator",zhiyou:"Content Optimizer",zhibu:"Publisher",zhichuan:"Distributor",zhixi:"Performance Analyzer",zhishu:"Orchestrator",s3:"S3 Memory"},
    zh: {zhiku:"智库",zhizao:"智造",zhiyou:"智优",zhibu:"智布",zhichuan:"智传",zhixi:"智析",zhishu:"智中枢",s3:"S3"}
  };
  document.getElementById('nav').innerHTML = DATA.tools.map(tool => {
    const label = navLabels[lang][tool.id] || tool.name.en.split(' ')[0];
    return `<a href="#${tool.id}" data-tool="${tool.id}">${label}</a>`;
  }).join('');
  // Tool sections
  document.getElementById('toolSections').innerHTML = DATA.tools.map(tool => `
    <section class="sec ${tool.cls}" id="${tool.id}">
      <div class="sec-grid">
        <div>
          <div class="badge">${tool.status==='dev'?'<span class="dot" style="background:#ffa726"></span> '+(lang==='en'?'In Development':'开发中'):'<span class="dot"></span> Production'}</div>
          <h2>${t(tool.name)}</h2>
          <p class="sub">${t(tool.sub)}</p>
          <p class="desc">${t(tool.desc)}</p>
          <a class="share" href="${tool.status==='dev'?'#'+tool.id:'https://smart-suite-phase-i-jzvrqtgxpmvzkssfc3bnnw.streamlit.app/?tool='+tool.id}" ${tool.status==='dev'?'style="opacity:.5;pointer-events:none;margin-right:10px"':'target="_blank" style="margin-right:10px"'}>🚀 ${lang==='en'?(tool.status==='dev'?'Coming Soon':'Launch Tool'):(tool.status==='dev'?'即将上线':'启动工具')}</a>
          ${tool.status!=='dev'?'<button class="share" onclick="shareLink(\''+tool.id+'\')" style="background:none">🔗 '+(lang==='en'?'Share':'分享')+'</button>':''}
          <div class="caps">
            <h4>${lang==='en'?'CORE CAPABILITIES':'核心能力'}</h4>
            ${t(tool.caps).map(c=>`<div class="cap">${c}</div>`).join('')}
          </div>
        </div>
        <div>
          <p class="il" style="margin-bottom:12px">BUSINESS IMPACT</p>
          <div class="igrid">
            ${tool.impact.map(i=>`<div class="icard"><div class="iv">${i.v}</div><div class="il">${t(i)}</div></div>`).join('')}
          </div>
        </div>
      </div>
    </section>`).join('');
  // Update lang button
  document.getElementById('langBtn').textContent = lang === 'en' ? '中文' : 'English';
  // Re-observe
  observeSections();
}

function shareLink(toolId){
  const url = 'https://smart-suite-phase-i-jzvrqtgxpmvzkssfc3bnnw.streamlit.app/?tool=' + toolId;
  navigator.clipboard.writeText(url).then(()=> showToast(lang==='en'? '🔗 Link copied: '+url : '🔗 链接已复制: '+url)).catch(()=>{
    const inp = document.createElement('textarea'); inp.value = url;
    document.body.appendChild(inp); inp.select(); document.execCommand('copy');
    document.body.removeChild(inp);
    showToast(lang==='en'? '🔗 Link copied!' : '🔗 链接已复制!');
  });
}
function showToast(msg){
  const el = document.getElementById('toast'); el.textContent = msg;
  el.style.opacity = '1'; setTimeout(()=> el.style.opacity = '0', 2500);
}
function observeSections(){
  const secs = document.querySelectorAll('.sec');
  const pills = document.querySelectorAll('.nav a');
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting){
      pills.forEach(p => p.classList.toggle('active', p.dataset.tool === e.target.id));
    }});
  }, {threshold:0.3, rootMargin:'-80px 0px 0px 0px'});
  secs.forEach(s => obs.observe(s));
}

document.getElementById('langBtn').addEventListener('click', ()=>{
  lang = lang === 'en' ? 'zh' : 'en'; render();
  // Preserve scroll position
});

// Nav smooth scroll
document.getElementById('nav').addEventListener('click', e => {
  if(e.target.tagName === 'A'){ e.preventDefault();
    const el = document.getElementById(e.target.dataset.tool);
    if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }
});

// Initial render
render();
// Handle hash on load
if(location.hash){
  setTimeout(()=>{ const el = document.querySelector(location.hash);
    if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }, 100);
}
</script>
